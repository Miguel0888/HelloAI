name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version, for example 0.1.0'
        required: true
        default: '0.1.0'
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    name: Build Java 8 shadow jar
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Java 8
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '8'

      - name: Resolve release version
        shell: bash
        run: |
          if [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            VERSION="${GITHUB_REF_NAME#v}"
          else
            VERSION="${{ github.event.inputs.version }}"
            VERSION="${VERSION#v}"
          fi

          echo "VERSION=${VERSION}" >> "${GITHUB_ENV}"
          echo "TAG=v${VERSION}" >> "${GITHUB_ENV}"

      - name: Build shadow jar
        run: |
          chmod +x ./gradlew
          ./gradlew --no-daemon clean test shadowJar -PreleaseVersion="${VERSION}"

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: HelloAI-${{ env.VERSION }}
          path: build/libs/HelloAI-${{ env.VERSION }}.jar
          if-no-files-found: error

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.TAG }}
          name: HelloAI ${{ env.TAG }}
          generate_release_notes: true
          files: build/libs/HelloAI-${{ env.VERSION }}.jar
          fail_on_unmatched_files: true
